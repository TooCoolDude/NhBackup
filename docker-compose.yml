services:
  nhbackup:
    image: sharpsalat/nhbackup:latest
    container_name: nhbackup
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - nhbackup-data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  nhbackup-data: